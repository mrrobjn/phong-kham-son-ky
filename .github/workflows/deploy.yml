name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Update config for production
        run: |
          cat > config.js << 'EOF'
          // Website Configuration (Auto-generated by GitHub Actions)
          const CONFIG = {
            WEBSITE_URL: 'https://mrrobjn.github.io/phong-kham-son-ky',
            WEBSITE_NAME: 'Phòng khám Sơn Kỳ'
          };
          EOF
          echo "Config updated for production deployment"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
